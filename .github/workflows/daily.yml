name: Opportunity Hunter (daily)

# Runs in the cloud, laptop-independent.
#  - Schedule: every day at 08:00 IST (02:30 UTC).
#  - Manual:   "Run workflow" button (workflow_dispatch) — use this to prove it works.
#
# Cloud mode differs from local:
#  * OH_PHONE=true     -> ntfy push to your phone (the cloud deliverable)
#  * OH_DESKTOP=false  -> no GUI on a headless runner
#  * OH_TASKFLOW=false -> TaskFlow is local-only (~/.taskflow); can't run here
# Dedup/history state is committed back to the repo so repeats aren't re-notified.

on:
  schedule:
    - cron: "30 2 * * *"   # 08:00 Asia/Kolkata
  workflow_dispatch: {}

permissions:
  contents: write          # needed to commit seen_items.json / history.json back

concurrency:
  group: opportunity-hunter
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    env:
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      CLIST_USERNAME: ${{ secrets.CLIST_USERNAME }}
      CLIST_API_KEY: ${{ secrets.CLIST_API_KEY }}
      # Auto-provided by Actions (no manual secret needed); lifts GitHub API rate limit.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Phase 2 — LLM intelligence (provider-agnostic chain; tried in order). Free,
      # no-card keys: Groq (console.groq.com), Cerebras (cloud.cerebras.ai),
      # OpenRouter (openrouter.ai/keys). Gemini is intentionally absent — reserved
      # for Nova's Kaggle x Google capstone. OH_PROFILE_JSON: the personal profile as
      # a JSON string (repo is public, so the real profile lives in a secret, never in
      # code). All optional — if none set, the run falls back to rule-based scoring.
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OH_PROFILE_JSON: ${{ secrets.OH_PROFILE_JSON }}
      # Telegram digest (interactive — buttons are handled by the Cloudflare bot).
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      OH_PHONE: "true"
      OH_DESKTOP: "false"
      OH_TASKFLOW: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the hunt
        run: python main.py --now

      - name: Persist dedup + history
        run: |
          git config user.name "opportunity-hunter[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update hunt state [skip ci]"
            git push
          fi
